<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Rainbow Entertainment — Full Cinematic Gallery.">
  <title>Gallery — Rainbow Entertainment</title>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="static/style.css">

  <!-- GSAP CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
  
  <!-- Gallery Script -->
  <script src="static/gallery.js" defer></script>
</head>
<body>

  <!-- ============================================
       HEADER / NAV
       ============================================ -->
  <header class="site-header" id="site-header">
    <a href="/" class="site-logo" style="text-decoration: none; font-family: 'Georgia', 'Times New Roman', serif; font-weight: bold; font-size: 1.8rem; letter-spacing: 1px;">
      <span style="color: rgb(220, 30, 38)">R</span><span style="color: rgb(245, 150, 25)">a</span><span style="color: rgb(240, 220, 60)">i</span><span style="color: rgb(60, 185, 75)">n</span><span style="color: rgb(35, 140, 200)">b</span><span style="color: rgb(70, 60, 180)">o</span><span style="color: rgb(140, 60, 155)">w</span>
    </a>
    <a href="/" class="btn-gallery">Home</a>
  </header>

  <!-- ============================================
       MAIN CONTENT
       ============================================ -->
  <main id="main-content" class="page-gallery">
    <div class="container">
      
      <div class="section-label" style="margin-bottom: 60px;">
        <span>Cinematic Archive</span>
      </div>

      <!-- Gallery Toolbar -->
      <div class="gallery-toolbar">
        <div class="gallery-search">
          <input type="text" id="gallery-search-input" placeholder="Search by title or description...">
        </div>
        <div class="gallery-sort">
          <label for="gallery-sort-select">Sort By:</label>
          <select id="gallery-sort-select">
            <option value="newest">Newest First</option>
            <option value="oldest">Oldest First</option>
            <option value="az">Title A-Z</option>
            <option value="za">Title Z-A</option>
          </select>
        </div>
      </div>

      <!-- Gallery Grid -->
      <div class="gallery-grid" id="gallery-grid">
        <!-- Videos injected by JS -->
      </div>

    </div>
  </main>

  <!-- ====== FOOTER / CONTACT ====== -->
  <footer class="site-footer" id="contact" style="margin-top: 120px;">
    <div class="container">
      <div class="section-label">
        <span>05 — Contact</span>
      </div>

      <h2 class="footer-cta">Let's Create<span class="cta-dot"></span></h2>

      <div class="footer-bottom">
        <div class="footer-col">
          <h4>Get In Touch</h4>
          <a href="mailto:sales@rainbo.in">sales@rainbo.in</a>
          <a href="mailto:admin@rainbo.in">admin@rainbo.in</a>
          <a href="tel:+919876543210">+91 98765 43210</a>
        </div>
        <div class="footer-col">
          <h4>Location</h4>
          <p>Mumbai, Maharashtra<br>India</p>
        </div>
        <div class="footer-col">
          <h4>Follow Us</h4>
          <a href="#">Instagram</a>
          <a href="#">YouTube</a>
          <a href="#">LinkedIn</a>
        </div>

      </div>

      <p class="footer-copyright">&copy; 2024 Rainbow Entertainment. All rights reserved.</p>
    </div>
  </footer>

</body>
</html>
